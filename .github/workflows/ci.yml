name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: construir
    runs-on: ubuntu-latest
    steps:
      - name: checkout codigo
        uses: actions/checkout@v4

      - name: Configurar nodejs
        uses: actions/setup-node@v4
        with:
          node-verson: "22"
          cache: 'yarn'
      - name: install dependencies
        run: yarn

      - name: run test
        run: yarn test

